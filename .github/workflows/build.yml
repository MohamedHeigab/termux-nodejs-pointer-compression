name: Build NodeJS with Pointer Compression

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Check for NodeJS updates
        id: check
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            LATEST_DATE=$(curl -s "https://api.github.com/repos/termux/termux-packages/commits?path=packages/nodejs&per_page=1" | jq -r '.[0].commit.committer.date')
            if [ "$LATEST_DATE" == "null" ] || [ -z "$LATEST_DATE" ]; then
               echo "Failed to fetch commit date, proceeding with build."
               echo "should_build=true" >> "$GITHUB_OUTPUT"
               exit 0
            fi
            TIMESTAMP=$(date -d "$LATEST_DATE" +%s)
            NOW=$(date +%s)
            DIFF=$((NOW - TIMESTAMP))
            if [ $DIFF -gt 86400 ]; then
              echo "No updates to packages/nodejs in the last 24 hours. Skipping."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "Updates found. Proceeding with build."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Not a scheduled run. Proceeding with build."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target_arch: [aarch64, arm, i686, x86_64]
      fail-fast: false
    steps:
    - name: Checkout termux-packages
      uses: actions/checkout@v4
      with:
        repository: termux/termux-packages
        path: termux-packages
        fetch-depth: 1

    - name: Patch nodejs build.sh to enable pointer compression
      run: |
        cd termux-packages
        sed -i 's/local _DEBUG=()/local _DEBUG=()\n\tif [ "$DEST_CPU" = "arm64" ] || [ "$DEST_CPU" = "x64" ]; then\n\t\t_DEBUG+=("--experimental-enable-pointer-compression")\n\tfi/' packages/nodejs/build.sh
        cat packages/nodejs/build.sh | grep -A 5 "local _DEBUG=()"

    - name: Build NodeJS
      run: |
        cd termux-packages
        ./scripts/run-docker.sh ./build-package.sh -a ${{ matrix.target_arch }} -I nodejs

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: nodejs-pointer-compression-${{ matrix.target_arch }}
        path: termux-packages/output/*.deb
